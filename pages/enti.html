<!-- Wrapper con scroll -->
<div class="h-screen overflow-y-auto bg-gray-50">

  <!-- Top Bar -->
  <div class="sticky top-0 bg-white shadow-sm z-40 safe-area-top">
    <div class="px-4 py-3">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-pink-600 rounded-xl flex items-center justify-center text-2xl">🎓</div>
        <div>
          <h1 class="text-2xl font-bold text-gray-900">Enti di Formazione</h1>
          <p class="text-xs text-gray-500">Regione Veneto</p>
        </div>
      </div>
      
      <!-- Search -->
      <div class="relative">
        <div class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none">
          <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </div>
        <input 
          type="text" 
          id="searchInputEnti"
          placeholder="Cerca ente o città..."
          class="w-full pl-12 pr-4 py-3 bg-gray-100 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"
        />
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="px-4 py-4 pb-24">
    <div class="grid grid-cols-2 gap-3 mb-6" id="statsEnti"></div>
    
    <div id="entiGrid" class="space-y-4"></div>
    <div id="loadingEnti" class="text-center py-12">
      <div class="inline-block w-12 h-12 border-4 border-purple-200 border-t-purple-600 rounded-full animate-spin mb-4"></div>
      <p class="text-gray-600">Caricamento...</p>
    </div>
  </div>

</div>

<!-- Bottom Sheet Sedi Enti -->
<div id="sediEnteSheet" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden" onclick="if(event.target===this) Enti.closeSediSheet()">
  <div class="bottom-sheet absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl max-h-[90vh] transition-transform duration-300 transform translate-y-full">
    <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mt-3 mb-4"></div>
    <div class="px-6 pb-4 border-b flex items-center justify-between">
      <div>
        <h3 class="text-xl font-bold" id="sediEnteName"></h3>
        <p class="text-sm text-gray-500" id="sediEnteCount"></p>
      </div>
      <button onclick="Enti.closeSediSheet()" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="overflow-y-auto p-6" style="max-height:calc(90vh - 100px)" id="sediEnteContent"></div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t h-20 z-40 safe-area-bottom">
  <div class="flex justify-around py-2">
    
    <button onclick="goBack()" class="flex flex-col items-center py-2 px-4 text-gray-400 hover:text-purple-600 transition">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      <span class="text-xs">Indietro</span>
    </button>
    
    <button onclick="navigateToHome()" class="flex flex-col items-center py-2 px-4 text-purple-600">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      <span class="text-xs font-semibold">Home</span>
    </button>
    
    <button onclick="openPreferitiPage()" class="flex flex-col items-center py-2 px-4 text-gray-400 hover:text-purple-600 transition">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
      </svg>
      <span class="text-xs">Preferiti</span>
    </button>
    
    <button onclick="openProfilePage()" class="flex flex-col items-center py-2 px-4 text-gray-400 hover:text-purple-600 transition">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      <span class="text-xs">Profilo</span>
    </button>
    
  </div>
</nav>

<style>
.line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* Bottom Sheet Animation */
.bottom-sheet.active {
  transform: translateY(0) !important;
}
</style>
